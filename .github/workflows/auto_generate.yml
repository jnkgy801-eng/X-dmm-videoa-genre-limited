name: DMM NTR特化・X投稿文ジェネレーター

# クリップ動画を生成スクリプトの実行中にリポジトリへpushするため、
# GITHUB_TOKEN に書き込み権限を明示的に付与する
permissions:
  contents: write

on:
  # 手動実行（細かいオプション指定はこちら）
  workflow_dispatch:
    inputs:
      post_start_index:
        description: '取得開始番号（空欄でランダム自動設定）例: 1→1件目〜, 31→31件目〜'
        required: false
        default: ''
        type: string
      dmm_sort_mode:
        description: 'ソートモード（自動投稿は選択に関わらず常に新着順で投稿されます）'
        required: false
        default: 'rank'
        type: choice
        options:
          - rank   # 人気順のみ（デフォルト）
          - date   # 新着順のみ
          - both   # 新着＋人気の両方をテキストファイルに保存
      dmm_floor:
        description: 'フロア種別'
        required: false
        default: 'videoa'
        type: choice
        options:
          - videoa
          - videoc
          - anime
          - doujin # FANZA同人
          - comic
          - goods
      dmm_price_range:
        description: '価格フィルター（商品の値段で絞り込み）'
        required: false
        default: 'all'
        type: choice
        options:
          - all          # すべての価格
          - 0-999        # 999円以下
          - 1000-1999    # 1000〜1999円
          - 2000-2999    # 2000〜2999円
          - 3000-4999    # 3000〜4999円
          - 5000-9999    # 5000〜9999円
          - 10000-99999  # 10000円以上
      auto_post_to_x:
        description: 'Buffer経由でXに自動投稿（予約投稿）する（デフォルトON）'
        required: false
        default: true
        type: boolean
      x_post_limit:
        description: '1回の実行で自動投稿する件数（適正化後は1〜2件を推奨）'
        required: false
        default: '2'
        type: string
      dmm_article:
        description: 'ジャンル絞り込み種別（genre=ジャンル指定 / actress=女優指定 等。空欄で絞り込みなし）'
        required: false
        default: 'genre'
        type: string
      dmm_article_id:
        description: 'ジャンル絞り込みID（DMM APIのgenre一覧等から取得したID。1件のみ指定可）'
        required: false
        default: '4111'
        type: string
      min_process_count:
        description: '価格フィルター使用時の最低保証件数（この件数に達するまで追加取得）'
        required: false
        default: '10'
        type: string

  # 適正化: 1日30件（4時間毎×5件）のような機械的ペースを避け、
  # 1日2回・1回2件（合計1日4件程度）の、人が運用しているような自然な頻度に変更。
  # 時刻も「毎時ちょうど」を避け、53分・17分という半端な時刻のままにして
  # Bot的な規則性を目立たせないようにしている。
  schedule:
    - cron: '17 * * * *'   # 日本時間 朝11:17頃
    - cron: '53 * * * *'   # 日本時間 夜18:53頃

jobs:
  generate-posts:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v3

      - name: Pythonのセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 依存ライブラリのインストール
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: ffmpegのインストール確認（サンプル動画クリップ生成用）
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Gitの設定（スクリプト実行中にクリップをpushするため先に設定）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: X投稿文を生成（＋設定により自動投稿・クリップのpushも実行中に行う）
        env:
          DMM_API_ID:           ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID:     ${{ secrets.DMM_AFFILIATE_ID }}
          POST_START_INDEX:     ${{ github.event.inputs.post_start_index }}
          DMM_SORT_MODE:        ${{ github.event.inputs.dmm_sort_mode || 'rank' }}
          DMM_FLOOR:            ${{ github.event.inputs.dmm_floor || 'videoa' }}
          DMM_PRICE_RANGE:      ${{ github.event.inputs.dmm_price_range || 'all' }}
          DMM_ARTICLE:          ${{ github.event.inputs.dmm_article || vars.DMM_ARTICLE || 'genre' }}
          DMM_ARTICLE_ID:       ${{ github.event.inputs.dmm_article_id || vars.DMM_ARTICLE_ID || '4111' }}
          MIN_PROCESS_COUNT:    ${{ github.event.inputs.min_process_count || '10' }}
          SAVE_TO_REPO:         'true'
          AUTO_POST_TO_X:       ${{ github.event.inputs.auto_post_to_x || 'true' }}
          X_POST_LIMIT:         ${{ github.event.inputs.x_post_limit || '2' }}
          # 【シャドウバン対策】サンプル動画の冒頭を数秒だけ切り出して投稿する機能。
          # ENABLE_VIDEO_CLIP=false にすると、従来どおりサンプル動画をフル添付する動作に戻せる。
          # 【地域制限のため既定でOFF】DMMのサンプル動画CDNは日本国内IP以外からの
          # アクセスをブロックしており、GitHub Actions（海外サーバー）からは常に
          # 失敗するため、動画取得自体を試みない設定にしている。
          # 日本国内IPのプロキシ／セルフホストランナーを用意した場合のみ true にする。
          ENABLE_SAMPLE_VIDEO: ${{ vars.ENABLE_SAMPLE_VIDEO || 'false' }}
          ENABLE_VIDEO_CLIP:    ${{ vars.ENABLE_VIDEO_CLIP || 'true' }}
          CLIP_START_SEC:       ${{ vars.CLIP_START_SEC || '0' }}
          CLIP_DURATION_SEC:    ${{ vars.CLIP_DURATION_SEC || '6' }}
          # Buffer経由の自動投稿で使用：BufferのAPI設定ページで発行したPersonal API Keyと
          # buffer_channel_setup.py で確認したチャンネルID
          BUFFER_API_KEY:       ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID:    ${{ secrets.BUFFER_CHANNEL_ID }}
        run: python dmm_x_post_generator.py

      - name: 生成したTXTをリポジトリにコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動生成: X投稿テキスト更新 ($(date +'%Y-%m-%d %H:%M:%S'))" && git push)
